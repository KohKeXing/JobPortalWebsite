{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Available Job Listings</h2>
<div class="row">
    {% for job in jobs %}
    <div class="col-md-6 mb-3">
        <div class="card shadow-sm h-100">
            <div class="card-body">
                <h5 class="card-title text-primary">{{ job.title }}</h5>
                <h6 class="card-subtitle mb-2 text-muted">{{ job.company_name }} — <small>{{ job.location }}</small></h6>
                <span class="badge bg-secondary mb-2">{{ job.job_type }}</span>
                <p class="card-text text-truncate">{{ job.description }}</p>
                <div class="d-flex gap-2">
                    <a href="/job/{{ job.id }}/update" class="btn btn-outline-warning btn-sm">Edit</a>
                    <form action="/job/{{ job.id }}/delete" method="POST" onsubmit="return confirm('Delete this job?');">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center my-5">
        <p class="text-muted fs-5">No jobs posted yet. Click "+ Post a Job" to get started!</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
