{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm max-width mx-auto p-4" style="max-width: 600px;">
    <h2>{{ 'Update' if job else 'Create' }} Job Listing</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Job Title</label>
            <input type="text" name="title" class="form-control" value="{{ job.title if job else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" name="company_name" class="form-control" value="{{ job.company_name if job else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control" value="{{ job.location if job else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Salary Range</label>
            <input type="text" name="salary" class="form-control" value="{{ job.salary if job else '' }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Job Type</label>
            <select name="job_type" class="form-select">
                <option value="Full-time" {{ 'selected' if job and job.job_type == 'Full-time' else '' }}>Full-time</option>
                <option value="Part-time" {{ 'selected' if job and job.job_type == 'Part-time' else '' }}>Part-time</option>
                <option value="Remote" {{ 'selected' if job and job.job_type == 'Remote' else '' }}>Remote</option>
                <option value="Internship" {{ 'selected' if job and job.job_type == 'Internship' else '' }}>Internship</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Job Description</label>
            <textarea name="description" class="form-control" rows="4" required>{{ job.description if job else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-success w-100">Save Job Listing</button>
    </form>
</div>
{% endblock %}
